services:
  - type: web
    name: arabic-song-conversion-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn song_lab.api.app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ACESTEP_API_URL
        sync: false
      - key: ACESTEP_API_KEY
        sync: false
      - key: ACESTEP_MODEL
        value: acestep-v15-turbo
